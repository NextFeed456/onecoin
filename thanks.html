<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>送信完了｜NextFeed</title>
  <meta name="description" content="ワンコイン切り抜きの依頼送信完了ページです。" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
      background: #0f172a;
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 20px;
      width: 100%;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 64px 0;
    }
    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 28px;
      padding: 36px;
      box-shadow: 0 16px 34px rgba(0,0,0,.28);
      text-align: center;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(30px, 6vw, 46px);
      line-height: 1.2;
      margin: 0 0 18px;
    }
    p {
      color: #cbd5e1;
      margin: 0 0 18px;
    }
    .notice {
      background: rgba(34,197,94,.08);
      border: 1px solid rgba(34,197,94,.22);
      border-radius: 18px;
      padding: 18px;
      margin: 26px 0;
      text-align: left;
    }
    .btn-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 700;
      text-decoration: none;
    }
    .btn-main { background: #22c55e; color: #052e16; }
    .btn-sub { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.28); }
    footer {
      padding: 28px 0;
      color: #94a3b8;
      font-size: 13px;
      background:#020617;
      text-align:center;
    }
    @media (max-width: 760px) {
      .card { padding: 28px 20px; }
      main { padding: 42px 0; }
    }
  </style>
</head>
<body>
  <main>
    <div class="wrap">
      <div class="card">
        <div class="icon">✅</div>
        <h1>送信ありがとうございます！</h1>
        <p>ワンコイン切り抜きの依頼内容を受け付けました。</p>
        <p>内容を確認後、NextFeedよりご連絡いたします。</p>

        <div class="notice">
          <strong style="color:#22c55e;">ご確認ください</strong><br>
          お支払い確認後に制作開始となります。<br>
          Xでの連絡を希望された方は、<a href="https://x.com/matsun0819" target="_blank" style="color:#93c5fd;">@matsun0819</a> から連絡できるよう、フォローをお願いします。
        </div>

        <div class="btn-row">
          <a class="btn btn-main" href="https://nextfeed456.github.io/onecoin/">依頼ページへ戻る</a>
          <a class="btn btn-sub" href="https://x.com/matsun0819" target="_blank">Xを確認する</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="wrap">
      <p>© NextFeed</p>
      <p>
        <a href="https://nextfeed456.github.io/privacy/">プライバシーポリシー</a> ｜
        <a href="https://nextfeed456.github.io/contact/">問い合わせ</a> ｜
        <a href="https://nextfeed456.github.io/about/">運営者情報</a>
      </p>
    </div>
  </footer>
</body>
</html>
