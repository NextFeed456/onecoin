<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>送信完了｜NextFeed</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Noto Sans JP',sans-serif;
background:#d9c7f5;
background:
radial-gradient(circle at top right,rgba(139,92,246,.18),transparent 22%),
linear-gradient(180deg,#f4ecff 0%,#e8d8ff 100%);
min-height:100vh;
display:flex;
flex-direction:column;
color:#111;
}

a{
text-decoration:none;
}

.wrap{
width:100%;
max-width:980px;
margin:auto;
padding:40px 20px;
}

main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:100%;
background:rgba(255,255,255,.72);
border:1px solid rgba(139,92,246,.12);
border-radius:38px;
padding:70px 40px;
text-align:center;
position:relative;
overflow:hidden;
backdrop-filter:blur(14px);
box-shadow:
0 20px 60px rgba(139,92,246,.12),
0 0 40px rgba(139,92,246,.08);
}

.card::before{
content:'';
position:absolute;
top:-120px;
right:-120px;
width:320px;
height:320px;
background:radial-gradient(circle,rgba(168,85,247,.18),transparent 70%);
}

.card::after{
content:'';
position:absolute;
bottom:-140px;
left:-120px;
width:320px;
height:320px;
background:radial-gradient(circle,rgba(139,92,246,.12),transparent 70%);
}

.content{
position:relative;
z-index:2;
}

.icon{
width:110px;
height:110px;
margin:0 auto 28px;
border-radius:999px;
display:flex;
align-items:center;
justify-content:center;
font-size:56px;
background:linear-gradient(135deg,#8b5cf6,#6d28d9);
box-shadow:0 0 35px rgba(139,92,246,.25);
color:#fff;
}

h1{
font-size:clamp(42px,6vw,68px);
font-weight:900;
line-height:1.2;
margin-bottom:20px;
color:#111;
}

.sub{
font-size:22px;
line-height:1.9;
color:#555;
font-weight:700;
margin-bottom:18px;
}

.badge{
display:inline-flex;
align-items:center;
gap:10px;
padding:12px 22px;
border-radius:999px;
background:#ffffff;
border:1px solid #ddd6fe;
font-size:15px;
font-weight:900;
margin-top:8px;
margin-bottom:34px;
color:#8b5cf6;
box-shadow:0 4px 12px rgba(139,92,246,.08);
}

.notice{
background:#f7f0ff;
border:1px solid #e9ddff;
border-radius:24px;
padding:28px;
text-align:left;
margin-bottom:34px;
}

.notice h2{
font-size:26px;
font-weight:900;
margin-bottom:16px;
color:#111;
}

.notice ul{
padding-left:22px;
display:flex;
flex-direction:column;
gap:10px;
color:#555;
line-height:1.9;
}

.notice strong{
color:#111;
}

.btn-row{
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
margin-top:10px;
}

.btn-main{
display:inline-flex;
align-items:center;
justify-content:center;
padding:18px 28px;
border-radius:18px;
background:linear-gradient(90deg,#8b5cf6,#6d28d9);
font-size:18px;
font-weight:900;
color:#fff;
box-shadow:0 0 25px rgba(139,92,246,.25);
}

.btn-sub{
display:inline-flex;
align-items:center;
justify-content:center;
padding:18px 28px;
border-radius:18px;
background:#fff;
font-size:18px;
font-weight:900;
color:#8b5cf6;
border:2px solid #c4b5fd;
}

.footer{
padding:40px 20px;
text-align:center;
font-size:14px;
color:#cbd5e1;
background:#081226;
display:flex;
flex-direction:column;
gap:14px;
justify-content:center;
align-items:center;
}

.footer-links{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:18px;
}

.footer-links a{
color:#cbd5e1;
}

@media(max-width:768px){

.card{
padding:48px 24px;
border-radius:30px;
}

.sub{
font-size:18px;
}

.notice{
padding:22px;
}

.btn-row{
flex-direction:column;
}

.btn-main,
.btn-sub{
width:100%;
}

}

</style>
</head>

<body>

<main>
<div class="wrap">

<div class="card">
<div class="content">

<div class="icon">
✅
</div>

<h1>
送信完了
</h1>

<p class="sub">
ご依頼ありがとうございます！<br>
内容を確認後、順次ご連絡いたします。
</p>

<div class="badge">
🟢 通常返信：24時間以内
</div>

<div class="notice">

<h2>
ご確認ください
</h2>

<ul>
<li><strong>お支払い確認後に制作開始となります。</strong></li>

<li>
Xでのご連絡をご希望の方は、
<a href="https://x.com/matsun0819" target="_blank" style="color:#8b5cf6;">
@matsun0819
</a>
のフォローをお願いいたします。
</li>

<li>
内容確認後、順次ご連絡いたします。
</li>

</ul>

</div>

<div class="btn-row">

<a href="https://nextfeed456.github.io/onecoin/" class="btn-main">
依頼ページへ戻る
</a>

<a href="https://x.com/matsun0819" target="_blank" class="btn-sub">
Xを確認する
</a>

</div>

</div>
</div>

</div>
</main>

<footer class="footer">

<div>
※ご依頼内容や素材は外部に公開しません　※ご相談・お見積りだけでもOKです
</div>

<div class="footer-links">
<a href="https://nextfeed456.github.io/privacy/">プライバシーポリシー</a>
<a href="https://nextfeed456.github.io/contact/">お問い合わせ</a>
<a href="https://nextfeed456.github.io/about/">運営者情報</a>
</div>

<div style="font-size:15px;font-weight:700;color:#ffffff;">
©NextFeed｜ワンコイン切り抜き
</div>

</footer>

</body>
</html>
